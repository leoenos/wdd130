<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact the Goob Lagooon White Water Rafting Unit</title>
    <meta name="description"
      content="An informational page of a White Water Rafting site to tell you more information about how to get in contact with the establishment">
    <meta name="author" content="Le'olani Enos">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/logo.png" alt="Logo of White Water Rafting Logo">
        <nav>
            <ul class="navheader">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="company-info">
            <h1>The Goob Lagoon: White Water Rafting</h1>

            <address>
                333 Chris Redfield Dr.<br>
                Little Rock, Arkansas<br>
                +1 (800) 123-1234<br>
                gooblagoonwwr@gooblagoon.com
            </address>
        </section>

        <section class="contact">
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d210124.28601714058!2d-92.63665528359378!3d34.62458879999999!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x87cd57a8e40f1f27%3A0xdfb6e4ad926dda64!2sGameStop!5e0!3m2!1sen!2sus!4v1781374670686!5m2!1sen!2sus"
                  width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>

            <form class="form">
                <div class="element">
                    <label for="fullname">Name:</label>
                    <input type="text" id="fullname" name="fullname" requried>
                </div>

                <div class="element">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <fieldset>
                    <legend>Message Purpose</legend>

                    <label><input type="radio" name="purpose" value="general" checked>General
                        Inquiry</label>
                    <label><input type="radio" name="purpose" value="reservation">Reservation
                        Question</label>
                    <label><input type="radio" name="purpose" value="suggestion">Website
                        Suggestion</label>
                </fieldset>

                <div class="element">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5"></textarea>
                </div>

                <label class="newsletter">
                    <input type="checkbox" name="newsletter">
                    Please Subscribe me to the monthly newsletter
                </label>

                <button type="submit">Get in Touch!</button>
            </form>
        </section>

        <section class="employees">
            <h2>We are Here to Serve You</h2>

            <div class="employee">
                <figure>
                    <img src="images/caseoh.jpeg" alt="CEO of Goob Lagoon">
                    <figcaption>CaseOh - CEO</figcaption>
                </figure>

                <figure>
                    <img src="images/joaquin.jpeg" alt="Maitenance Manager and Quality Observer">
                    <figcaption>Joaquin - Maitenance</figcaption>
                </figure>

                <figure>
                    <img src="images/kitty.webp" alt="Expert Lead Raft Guide">
                    <figcaption>Kitty Black - Route Guide</figcaption>
                </figure>
            </div>
        </section>
    </main>

    <footer>
        <p>©️2026 💫Le'olani Enos💫 Denver, Colorado, USA<br>Goob Lagoon: White Water Rafting</p>
        <nav class="socialmedia">
            <a href="https://instagram.com">
                <img src="images/instagram.svg" alt="Link to Instagram">
            </a>
            <a href="https://tiktok.com">
                <img src="images/tiktok.svg" alt="Link to TikTok">
            </a>
            <a href="https://youtube.com">
                <img src="images/youtube.svg" alt="Link to YouTube">
            </a>
        </nav>
    </footer>
</body>

</html>
