<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 130 | Quiz</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>
    <header>
        <h1>HTML and CSS Quiz</h1>
    </header>

    <main>
        <form>
            <label for="q1">What does the acronym CSS stand for?</label>
            <input type="text" id="q1" name="q1">

            <label for="q2">How are id and class attributes selected in CSS?</label>
            <textarea id="q2" name="q2"></textarea>

            <label for="q3">Which of the following is a valid CSS comment?</label>
            <select id="q3" name="q3">
                <option value="" selected disabled>Choose One...</option>
                <option value="1">/This is a comment/</option>
                <option value="2">&lt;!This is a comment&gt;</option>
                <option value="3">**This is a comment**</option>
                <option value="4">/*This is a comment*/</option>
            </select>

            <label for="q4">What is the bottom margin given this declaration?</label>
            <input type="number" id="q4" name="q4">

            <button type="submit">Submit Quiz</button>
        </form>
    </main>
</body>

</html>
